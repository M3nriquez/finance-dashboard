<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta - Painel Corporativo</title>
    <link rel="stylesheet" href="/estilo-auth.css">
    <style>
        .topo-auth { display: flex; justify-content: flex-end; margin-bottom: 15px; }
        .seletor-idioma-auth { padding: 6px; border-radius: 6px; border: 1px solid #e5e7eb; outline: none; font-family: 'Inter'; background: white; cursor: pointer; color: #374151; }
        .btn-principal:disabled { opacity: 0.7; cursor: not-allowed; }
        
        .banner-alerta {
            display: none;
            padding: 12px;
            margin-bottom: 16px;
            border-radius: 8px;
            text-align: center;
            font-weight: 500;
            font-size: 14px;
            color: white;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            animation: surgir 0.3s ease-out;
        }
        
        @keyframes surgir {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="caixa-auth">
        <div class="topo-auth">
            <select id="seletorIdioma" class="seletor-idioma-auth">
                <option value="pt">🇧🇷 PT</option>
                <option value="en">🇺🇸 EN</option>
                <option value="es">🇪🇸 ES</option>
            </select>
        </div>

        <div id="bannerAlerta" class="banner-alerta"></div>

        <h2 data-i18n="tituloCadastro">Criar Conta ✨</h2>
        
        <form id="formCadastro" class="formulario" onsubmit="return false;">
            <input type="text" id="nome" data-i18n-placeholder="placeholderNome" placeholder="Seu Nome Completo" required>
            <input type="email" id="email" data-i18n-placeholder="placeholderEmail" placeholder="Seu E-mail" required>
            <input type="password" id="senha" data-i18n-placeholder="placeholderSenha" placeholder="Crie uma Senha" required>
            <button type="submit" id="btnCadastrar" class="btn-principal" data-i18n="btnCadastrar">Começar Agora</button>
        </form>
        
        <a href="/login.html" class="link-rodape" data-i18n="linkLogin" style="margin-top: 24px; display: block;">Já tem uma conta? Faça login aqui</a>
    </div>

    <script>
        // NOVO: Dicionário atualizado com as mensagens de erro do Banco de Dados!
        const dicionarioAuth = {
            pt: { tituloCadastro: "Criar Conta ✨", placeholderNome: "Seu Nome Completo", placeholderEmail: "Seu E-mail", placeholderSenha: "Crie uma Senha", btnCadastrar: "Começar Agora", linkLogin: "Já tem uma conta? Faça login aqui", erroConexao: "Erro ao conectar.", btnCarregando: "⏳ Aguarde...", msgSucesso: "Usuário cadastrado com sucesso!", "E-mail já cadastrado.": "E-mail já cadastrado." },
            en: { tituloCadastro: "Create Account ✨", placeholderNome: "Your Full Name", placeholderEmail: "Your Email", placeholderSenha: "Create a Password", btnCadastrar: "Start Now", linkLogin: "Already have an account? Login here", erroConexao: "Connection error.", btnCarregando: "⏳ Please wait...", msgSucesso: "User successfully registered!", "E-mail já cadastrado.": "Email already registered." },
            es: { tituloCadastro: "Crear Cuenta ✨", placeholderNome: "Tu Nombre Completo", placeholderEmail: "Tu Correo", placeholderSenha: "Crea una Contraseña", btnCadastrar: "Empezar Ahora", linkLogin: "¿Ya tienes cuenta? Inicia sesión aquí", erroConexao: "Error de conexión.", btnCarregando: "⏳ Espere...", msgSucesso: "¡Usuario registrado con éxito!", "E-mail já cadastrado.": "Correo ya registrado." }
        };

        let idiomaAtual = localStorage.getItem('idiomaPreferido') || 'pt';
        document.getElementById('seletorIdioma').value = idiomaAtual;

        function mostrarAlerta(mensagem, tipo = 'sucesso') {
            const banner = document.getElementById('bannerAlerta');
            banner.innerText = mensagem;
            banner.style.background = tipo === 'sucesso' ? '#10b981' : '#ef4444';
            banner.style.display = 'block';
            setTimeout(() => { banner.style.display = 'none'; }, 3500);
        }

        function aplicarIdioma() {
            const textos = dicionarioAuth[idiomaAtual];
            document.querySelectorAll('[data-i18n]').forEach(el => { el.innerText = textos[el.getAttribute('data-i18n')]; });
            document.querySelectorAll('[data-i18n-placeholder]').forEach(el => { el.placeholder = textos[el.getAttribute('data-i18n-placeholder')]; });
        }

        document.getElementById('seletorIdioma').addEventListener('change', (evento) => { idiomaAtual = evento.target.value; localStorage.setItem('idiomaPreferido', idiomaAtual); aplicarIdioma(); });
        aplicarIdioma();

        document.getElementById('btnCadastrar').addEventListener('click', async function(evento) {
            evento.preventDefault(); 
            const nome = document.getElementById('nome').value;
            const email = document.getElementById('email').value;
            const senha = document.getElementById('senha').value;
            const btn = document.getElementById('btnCadastrar');
            const textos = dicionarioAuth[idiomaAtual];

            if(!nome || !email || !senha) return;

            btn.disabled = true;
            btn.innerText = textos.btnCarregando;

            try {
                const resposta = await fetch('/cadastro', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nome, email, senha }) 
                });
                const dados = await resposta.json();
                
                if (resposta.ok) {
                    mostrarAlerta(textos.msgSucesso, 'sucesso');
                    document.getElementById('formCadastro').reset();
                    setTimeout(() => { window.location.href = '/login.html'; }, 1500);
                } else {
                    // Traduz o erro do banco de dados (ex: "E-mail já cadastrado")
                    const erroTraduzido = textos[dados.erro] || dados.erro;
                    mostrarAlerta(erroTraduzido, 'erro');
                    
                    // Destrava o botão IMEDIATAMENTE
                    btn.disabled = false;
                    btn.innerText = textos.btnCadastrar;
                }
            } catch (erro) {
                mostrarAlerta(textos.erroConexao, 'erro');
                
                // Destrava o botão aqui também
                btn.disabled = false;
                btn.innerText = textos.btnCadastrar;
            }
        });
    </script>
</body>
</html>
